<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOUSING STANDARDS — Update Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --blue-primary: #1A73E8;
            --blue-vibrant: #00A3FF;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #0F172A;
            --text-secondary: #64748B;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            height: 100vh;
            background: #F8FAFC;
            background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            opacity: 0;
            animation: fadeInPage 0.4s ease forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: scale(1.02); }
            to { opacity: 1; transform: scale(1); }
        }

        .page-exit {
            animation: fadeOutPage 0.5s ease forwards !important;
        }

        @keyframes fadeOutPage {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        body::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.3));
            z-index: 1;
        }

        header {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 60px;
        }

        .logo-container {
            display: flex; align-items: center; gap: 12px;
            font-weight: 700; font-size: 18px; color: #FFFFFF;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        main {
            position: relative; z-index: 10;
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding-bottom: 60px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(100px);
            -webkit-backdrop-filter: blur(100px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 40px 100px rgba(15, 23, 42, 0.1);
            text-align: center;
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 { font-size: 32px; font-weight: 800; color: #0f172a; margin: 0 0 8px 0; letter-spacing: -0.8px; }
        p.subtitle { font-size: 15px; color: var(--text-secondary); margin-bottom: 32px; }

        .input-wrapper { 
            position: relative; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
        }
        .input-wrapper i { 
            color: var(--text-main); 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px; 
            height: 24px;
            flex-shrink: 0;
            opacity: 0.9;
        }
        .input-wrapper input {
            flex: 1;
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 14px; 
            padding: 16px 20px; 
            font-size: 15px; 
            color: var(--text-main);
            box-sizing: border-box; 
            transition: all 0.3s var(--ease);
            position: relative;
            z-index: 1;
        }
        .input-wrapper input:focus { 
            outline: none; 
            background: white; 
            border-color: var(--blue-primary); 
            box-shadow: 0 10px 25px -5px rgba(26, 115, 232, 0.1), 0 0 0 4px rgba(26, 115, 232, 0.05); 
        }

        .toggle-pwd { 
            position: absolute !important; 
            right: 16px !important; 
            left: auto !important;
            top: 50% !important;
            transform: translateY(-50%) !important;
            cursor: pointer !important; 
            pointer-events: auto !important;
            z-index: 10 !important;
        }

        .btn-update {
            width: 100%; background: linear-gradient(180deg, #1aa3ff 0%, #1a73e8 100%);
            color: white; border: none; padding: 16px; border-radius: 12px;
            font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 8px;
            box-shadow: 0 10px 20px rgba(26, 115, 232, 0.2); transition: all 0.2s;
        }
        .btn-update:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(26, 115, 232, 0.3); }
        .btn-update:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        #successMsg { display: none; color: #16a34a; background: rgba(22, 163, 74, 0.1); padding: 16px; border-radius: 12px; margin-top: 24px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Logo" style="width: 40px; height: 40px; border-radius: 8px; object-fit: cover;">
            HOUSING STANDARDS
        </div>
    </header>

    <main>
        <div class="glass-card">
            <i data-lucide="shield-check" style="width: 48px; height: 48px; margin-bottom: 24px; color: var(--blue-primary);"></i>
            <h1>Set New Password</h1>
            <p class="subtitle">Please enter your new secure password below.</p>

            <form id="updateForm">
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" placeholder="New Password" required minlength="6">
                    <i data-lucide="eye" class="toggle-pwd"></i>
                </div>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm New Password" required minlength="6">
                </div>
                <button type="submit" class="btn-update" id="updateBtn">Update Password</button>
            </form>

            <div id="successMsg">
                <strong>Password updated!</strong><br>
                Your password has been changed successfully. Redirecting to login...
            </div>

            <div id="errorMsg" style="color: #ff453a; margin-top: 24px; font-weight: 500; font-size: 14px;"></div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        
        document.addEventListener('click', (e) => {
            const toggle = e.target.closest('.toggle-pwd');
            if (toggle) {
                const input = toggle.previousElementSibling;
                if (input && input.tagName === 'INPUT') {
                    const isPassword = input.type === 'password';
                    input.type = isPassword ? 'text' : 'password';
                    toggle.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
                    lucide.createIcons();
                }
            }
        });
    </script>
    <script src="update-password.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Housing Admin Portal — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons for the input fields -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        (function() {
            // If already logged in, redirect to dashboard immediately
            if (localStorage.getItem('admin_session')) {
                window.location.href = '/index.html';
                document.documentElement.style.display = 'none';
            }
        })();
    </script>
    <style>
        :root {
            --blue-primary: #1A73E8;
            --blue-vibrant: #00A3FF;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #0F172A;
            --text-secondary: #64748B;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #F8FAFC;
            /* Background 3D Illustration Layer */
            background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            opacity: 0;
            animation: fadeInPage 0.4s ease forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: scale(1.02); }
            to { opacity: 1; transform: scale(1); }
        }

        .page-exit {
            animation: fadeOutPage 0.5s ease forwards !important;
        }

        @keyframes fadeOutPage {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* Darker subtle overlay to keep header text readable while making the image clear */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.3));
            z-index: 1;
        }

        /* Top Navigation Bar */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 60px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 18px;
            color: #FFFFFF;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            color: #FFFFFF;
            filter: drop-shadow(0 1px 4px rgba(0,0,0,0.3));
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-links a {
            text-decoration: none;
            color: #FFFFFF;
            font-weight: 600;
            font-size: 14px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
            opacity: 0.9;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        .review-badge {
            background: #1e4b8a;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Main Sign-Up Card Container */
        main {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 60px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(100px);
            -webkit-backdrop-filter: blur(100px);
            border: 2px solid var(--glass-border);
            border-radius: 40px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 40px 100px rgba(15, 23, 42, 0.1);
            text-align: center;
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-icon {
            margin-bottom: 24px;
            color: #1e293b;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
            margin: 0 0 8px 0;
            letter-spacing: -0.8px;
        }

        p.subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .input-wrapper i {
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            opacity: 0.9;
        }

        .input-wrapper input {
            flex: 1;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 14px;
            padding: 16px 20px;
            font-size: 15px;
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.3s var(--ease);
            position: relative;
            z-index: 1;
        }

        .input-wrapper input:focus {
            outline: none;
            background: white;
            border-color: var(--blue-primary);
            box-shadow: 0 10px 25px -5px rgba(26, 115, 232, 0.1), 0 0 0 4px rgba(26, 115, 232, 0.05);
        }

        .toggle-pwd {
            position: absolute !important;
            right: 16px !important;
            left: auto !important;
            top: 51% !important;
            transform: translateY(-50%) !important;
            cursor: pointer !important;
            pointer-events: auto !important;
            z-index: 10 !important;
        }

        /* Button */
        .btn-create {
            width: 100%;
            background: linear-gradient(180deg, #1aa3ff 0%, #1a73e8 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
            box-shadow: 0 10px 20px rgba(26, 115, 232, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(26, 115, 232, 0.3);
        }

        footer {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        footer strong { color: #1e293b; }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <i data-lucide="home" class="logo-icon"></i>
            Housing Admin Portal
        </div>
        <div class="nav-links">
            <a href="/login.html">Log In</a>
        </div>
    </header>

    <main>
        <div class="glass-card">
            <i data-lucide="home" class="card-icon" style="width: 48px; height: 48px;"></i>
            <h1>Create Your Account</h1>
            <p class="subtitle">Join the Housing Admin Portal today.</p>

            <form id="signupForm">
                <div class="input-wrapper">
                    <i data-lucide="user"></i>
                    <input type="text" id="fullname" placeholder="Full Name (e.g. Jane Smith)" required>
                </div>
                <div class="input-wrapper">
                    <i data-lucide="mail"></i>
                    <input type="email" id="email" placeholder="Email ID" required>
                </div>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" placeholder="Password" required minlength="8">
                    <i data-lucide="eye" class="toggle-pwd"></i>
                </div>
                <button type="submit" class="btn-create" id="signupBtn">Create Account</button>
            </form>

            <footer>
                <div style="margin-bottom: 20px;">By signing up, you agree to our <strong>Terms and Privacy Policy</strong>.</div>
                <div style="padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); font-weight: 500;">
                    Already have an account? <a href="login.html" style="color: var(--blue-primary); font-weight: 700; text-decoration: none; margin-left: 4px;">Log In</a>
                </div>
            </footer>
            <div id="errorMsg" style="color: #ff453a; margin-top: 16px; font-weight: 500; font-size: 14px;"></div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        
        // Robust delegated listener for password toggling
        document.addEventListener('click', (e) => {
            const toggle = e.target.closest('.toggle-pwd');
            if (toggle) {
                const input = toggle.previousElementSibling; // The password input
                if (input && input.tagName === 'INPUT') {
                    const isPassword = input.type === 'password';
                    input.type = isPassword ? 'text' : 'password';
                    toggle.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
                    lucide.createIcons();
                }
            }

            // Smooth link transitions
            const link = e.target.closest('a');
            if (link && link.getAttribute('href') && !link.getAttribute('target')) {
                const href = link.getAttribute('href');
                if (href.startsWith('/') || href.endsWith('.html')) {
                    e.preventDefault();
                    document.body.classList.add('page-exit');
                    setTimeout(() => {
                        window.location.href = href;
                    }, 400);
                }
            }
        });
    </script>
    <script src="signup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Housing Admin — Join the Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #0A84FF;
            --blue-gradient: linear-gradient(135deg, #0A84FF 0%, #0050D0 100%);
            --bg: #F2F2F7;
            --card-bg: rgba(255, 255, 255, 0.75);
            --border: rgba(60, 60, 67, 0.12);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-image: 
                radial-gradient(at 0% 0%, rgba(10, 132, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(94, 92, 230, 0.15) 0px, transparent 50%);
        }
        .container {
            display: flex;
            width: 1000px;
            max-width: 90vw;
            height: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 24px 80px rgba(0,0,0,0.4);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .visual-side {
            flex: 1;
            background: linear-gradient(45deg, #1C1C1E 0%, #2C2C2E 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .visual-side::after {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=1000') center/cover;
            opacity: 0.15;
            filter: grayscale(1);
        }
        .form-side {
            width: 440px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 8px; letter-spacing: -1.2px; color: #1C1C1E; }
        p { color: #636366; font-size: 15px; margin-bottom: 40px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #8E8E93; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.8px; }
        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            font-size: 15px;
            background: #F2F2F7;
            box-sizing: border-box;
            transition: all 0.25s;
        }
        input:focus {
            outline: none;
            border-color: var(--blue);
            background: white;
            box-shadow: 0 0 0 4px rgba(10,132,255,0.1);
        }
        .btn-submit {
            width: 100%;
            background: var(--blue-gradient);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(10,132,255,0.3);
        }
        .btn-submit:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(10,132,255,0.4);
        }
        .footer-link { margin-top: 32px; text-align: center; font-size: 14px; color: #8E8E93; }
        .footer-link a { color: var(--blue); text-decoration: none; font-weight: 600; }
        #errorMsg { color: #FF453A; font-size: 13px; margin-top: 20px; text-align: center; min-height: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="visual-side">
            <div style="z-index: 10; color: white; text-align: center; padding: 40px;">
                <h2 style="font-size: 40px; margin-bottom: 10px; letter-spacing: -1px;">Modern Admin</h2>
                <p style="color: rgba(255,255,255,0.6);">Fast, Secure, and Built for Scale.</p>
            </div>
        </div>
        <div class="form-side">
            <h1>Create Account</h1>
            <p>Enter your details to get started.</p>
            <form id="signupForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="janesmith" required>
                </div>
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" id="email" placeholder="jane@portal.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="8">
                </div>
                <button type="submit" class="btn-submit" id="signupBtn">Get Started</button>
                <div id="errorMsg"></div>
            </form>
            <div class="footer-link">
                Already member? <a href="/index.html">Log In</a>
            </div>
        </div>
    </div>
    <script src="signup.js"></script>
</body>
</html>

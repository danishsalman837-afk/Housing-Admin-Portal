<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Modal Overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: flex-start;
    padding: 30px;
    overflow-y: auto;
  }
  .modal-overlay.active { display: flex; }

  /* Modal Box */
  .modal-box {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 700px;
    padding: 30px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: slideIn 0.3s ease;
    margin: auto;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #e2e8f0;
  }
  .modal-header h2 {
    margin: 0;
    color: #1a3a52;
    font-size: 22px;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 28px;
    cursor: pointer;
    color: #888;
    width: auto;
    padding: 5px 10px;
    box-shadow: none;
  }
  .modal-close:hover {
    color: #333;
    background: #f0f0f0;
    border-radius: 4px;
    transform: none;
    box-shadow: none;
  }

  /* Modal Fields */
  .modal-field {
    margin-bottom: 16px;
  }
  .modal-field label {
    display: block;
    font-weight: 600;
    color: #1a3a52;
    margin-bottom: 4px;
    font-size: 13px;
    text-transform: capitalize;
  }
  .modal-field input,
  .modal-field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e2e8f0;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.3s;
  }
  .modal-field input:focus,
  .modal-field textarea:focus {
    border-color: #0066cc;
    outline: none;
    background: #f0f7ff;
  }
  .modal-field textarea {
    min-height: 60px;
    resize: vertical;
  }
  .modal-field.readonly input {
    background: #f5f5f5;
    color: #888;
    cursor: not-allowed;
  }

  /* Solicitor highlight */
  .solicitor-section {
    background: #f0f7ff;
    border: 1px solid #cce0ff;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .solicitor-section label {
    color: #0066cc;
    font-size: 14px;
    font-weight: 700;
  }

  /* Modal Actions */
  .modal-actions {
    display: flex;
    gap: 12px;
    margin-top: 25px;
    padding-top: 15px;
    border-top: 2px solid #e2e8f0;
  }
  .modal-actions button {
    flex: 1;
    padding: 12px;
    font-size: 14px;
    border-radius: 6px;
  }
  .btn-save {
    background: linear-gradient(135deg, #28a745, #1e7e34) !important;
    box-shadow: 0 4px 15px rgba(40,167,69,0.3) !important;
  }
  .btn-save:hover {
    background: linear-gradient(135deg, #218838, #1a6b2d) !important;
  }
  .btn-cancel {
    background: linear-gradient(135deg, #6c757d, #555) !important;
    box-shadow: 0 4px 15px rgba(108,117,125,0.3) !important;
  }
  .btn-cancel:hover {
    background: linear-gradient(135deg, #5a6268, #444) !important;
  }

  /* Action buttons in table */
  .action-btns {
    display: flex;
    gap: 6px;
  }
  .view-btn, .edit-btn {
    padding: 8px 16px !important;
    font-size: 12px !important;
    width: auto !important;
    border-radius: 4px !important;
  }
  .edit-btn {
    background: linear-gradient(135deg, #28a745, #1e7e34) !important;
    box-shadow: 0 2px 8px rgba(40,167,69,0.3) !important;
  }
  .edit-btn:hover {
    background: linear-gradient(135deg, #218838, #1a6b2d) !important;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    padding: 14px 24px;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    font-size: 14px;
    z-index: 2000;
    animation: toastIn 0.4s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .toast.success { background: #28a745; }
  .toast.error { background: #dc3545; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<h1>Admin Dashboard</h1>

<button id="downloadCsvBtn" class="button">Download All Submissions (CSV)</button>
<table id="submissionTable">
    <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Tenant Type</th>
            <th>Submitted At</th>
            <th>Solicitor</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<!-- View/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox"></div>
</div>

<script src="dashboard.js"></script>
</body>
</html>

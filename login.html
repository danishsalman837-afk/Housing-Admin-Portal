<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Login - Housing Disrepair</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        .login-card {
            width: 380px; 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.8);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; font-weight: 800; color: #1e293b; font-size: 14px; }
        h1 { font-size: 20px; font-weight: 800; color: #1e293b; margin-bottom: 10px; }
        p { font-size: 13px; color: #64748b; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 14px 16px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 14px; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-login { 
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 700; font-size: 15px; 
            cursor: pointer; transition: 0.3s; margin-bottom: 15px; 
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }
        .btn-login:hover { transform: translateY(-2px); opacity: 0.9; }

        .footer { font-size: 11px; color: #94a3b8; }
        .error { font-size: 12px; color: #ef4444; margin-bottom: 15px; display: none; }

        /* Subtle Animated Background */
        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 10%, #eff6ff 0%, transparent 50%),
                        radial-gradient(circle at 90% 90%, #fef2f2 0%, transparent 50%);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="login-card">
        <div class="brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #2563eb;"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            ADMIN GATEWAY
        </div>
        <h1>Welcome Back</h1>
        <p>Security clearance required for @energygrants.online accounts.</p>

        <div id="errorMessage" class="error">Access denied. Restricted domain.</div>
        
        <div class="input-group">
            <label>Work Email</label>
            <input type="email" id="email" placeholder="agent@energygrants.online">
        </div>
        
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-login" onclick="handleLogin()">Authorize Access</button>
        
        <div class="footer">Restricted System | Secure Connection Active</div>
    </div>

    <script>
        // Use your existing Supabase credentials
        const supabaseUrl = "PASTE_YOUR_SUPABASE_URL_HERE";
        const supabaseKey = "PASTE_YOUR_ANON_KEY_HERE";
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMessage');

            // 1. CHECK DOMAIN (BLOCK OTHERS IMMEDIATELY)
            if (!email.toLowerCase().endsWith('@energygrants.online')) {
                errorEl.innerText = "Restricted domain only. Access denied.";
                errorEl.style.display = 'block';
                return;
            }

            // 2. SIGN IN WITH SUPABASE
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorEl.innerText = error.message;
                errorEl.style.display = 'block';
            } else {
                window.location.href = 'index.html';
            }
        }

        // Check if already logged in
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
